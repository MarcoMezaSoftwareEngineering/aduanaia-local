# Levanta Milvus Standalone + dependencias (etcd, MinIO) en Docker.
# Requiere Docker Engine instalado en Windows (sin Docker Desktop si se quiere evitar licencia,
# se puede usar Docker CE vía WSL2 backend o Podman compatible).
#
# Uso:
#   docker compose up -d
#   docker compose ps         # verificar que los 3 servicios están healthy
#   docker compose logs -f milvus
#   docker compose down       # detener
#   docker compose down -v    # detener y borrar volúmenes (¡pierdes los vectores!)
#
# Puerto Milvus: 19530 (cliente). 9091 expone healthcheck HTTP.

services:
  etcd:
    container_name: aduanaia-etcd
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command:
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: aduanaia-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: aduanaia-milvus
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  attu:
    # UI web oficial de Milvus. Abre http://localhost:8200 tras levantarla.
    # Útil para inspeccionar colecciones, correr queries manuales, ver índices.
    container_name: aduanaia-attu
    image: zilliz/attu:v2.5.3
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8200:3000"
    depends_on:
      milvus:
        condition: service_healthy
